name: Build and Deploy to Azure App Service (Windows)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: AngularApp/package-lock.json

      - name: Restore dependencies
        run: dotnet restore

      # Your publish (this builds Angular via your .csproj target)
      - name: Publish project
        run: dotnet publish src/AngularApp/AngularApp.csproj -c Release -o ./publish

      # ⬇️ NEW: Force CSR index into the published output
      - name: Replace published index.html with CSR version
        run: |
          if [ -f ./publish/wwwroot/index.csr.html ]; then
            cp ./publish/wwwroot/index.csr.html ./publish/wwwroot/index.html
            echo "✔ Replaced ./publish/wwwroot/index.html with CSR version"
          elif [ -f AngularApp/dist/AngularApp/browser/index.csr.html ]; then
            # Fallback in case CSR wasn’t copied to wwwroot by publish
            cp AngularApp/dist/AngularApp/browser/index.csr.html ./publish/wwwroot/index.html
            echo "✔ Copied CSR index from Angular dist to publish/wwwroot/index.html"
          else
            echo "❌ CSR index not found (looked in publish/wwwroot and Angular dist)."
            ls -R ./publish/wwwroot || true
            exit 1
          fi

      - name: Print published index.html
        run: |
          echo "----- index.html content -----"
          sed -n '1,200p' ./publish/wwwroot/index.html || echo "index.html not found"
          echo "------------------------------"
          echo "----- wwwroot listing -----"
          ls -lah ./publish/wwwroot || true
          echo "---------------------------"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: angularapp
          slot-name: Production
          package: ./publish
          clean: true

      - name: Restart App Service
        run: az webapp restart --name angularapp --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
