name: Build and Deploy to Azure App Service (Windows)

on:
  push:
    branches:
      - main

permissions:
  id-token: write       # required for OIDC login
  contents: read        # required for actions/checkout 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. Setup Node.js for Angular
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: AngularApp/package-lock.json

      # 4. Install Angular dependencies (required for the .csproj target)
      - name: Install Angular dependencies
        run: npm install
        working-directory: AngularApp # Set working directory to the Angular project root

      # 6. Build & Publish (includes Angular build via .csproj target)
      - name: Publish project 
        run: dotnet publish src/AngularApp/AngularApp.csproj -c Release -o ./publish

      # 7. Debugging: print published index.html
      - name: Print index.html
        run: |
          echo "----- index.html content -----"
          cat ./publish/wwwroot/index.html || echo "index.html not found"
          echo "------------------------------"

      # 8. Azure Login with OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

   # 9. Deploy to Azure WebApp
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
        app-name: angularapp
        slot-name: Production
        package: ./publish
        clean: true 

      # 10. Set Default Document and Restart App Service
      - name: Set Default Document and Restart App Service
        run: |
          # Set the list of default documents, prioritizing index.csr.html
          az webapp config set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name angularapp \
            --default-documents "index.csr.html,Default.htm,Default.html,Default.asp,index.htm,index.html,iisstart.htm,default.aspx,index.php"

          # Restart the App Service to apply changes
          az webapp restart --name angularapp --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
