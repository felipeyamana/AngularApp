name: Build and Deploy to Azure App Service (Windows)

on:
  push:
    branches:
      - main

permissions:
  id-token: write       # required for OIDC login
  contents: read        # required for actions/checkout 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. (Optional) Setup Node for Angular
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: AngularApp/package-lock.json

      # 4. Restore .NET dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 5. Build & Publish (includes Angular build via your .csproj target)
      - name: Publish project
        run: dotnet publish src/AngularApp/AngularApp.csproj -c Release -o ./publish

      # 6. Azure Login with OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 7. Deploy to Azure App Service, wiping old files first
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: angularapp
          slot-name: Production
          package: ./publish
          clean: true 
