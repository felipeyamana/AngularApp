name: Build and Deploy to Azure App Service (Windows)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js for Angular
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: AngularApp/package-lock.json

      # 3. Build Angular app
      - name: Install Angular dependencies
        run: npm ci
        working-directory: AngularApp

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: AngularApp

      # 4. Copy Angular build output to ASP.NET Core wwwroot
      - name: Copy Angular dist to wwwroot
        run: |
          rm -rf src/AngularApp/AngularApp/wwwroot/*
          cp -r AngularApp/dist/AngularApp/browser/* src/AngularApp/wwwroot/

      # 5. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 6. Restore .NET dependencies
      - name: Restore dependencies
        run: dotnet restore src/AngularApp/AngularApp.csproj

      # 7. Publish ASP.NET Core app
      - name: Publish project
        run: dotnet publish src/AngularApp/AngularApp.csproj -c Release -o ./publish

      # 8. Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 9. Deploy to App Service (clean wipe first)
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: angularapp
          slot-name: Production
          package: ./publish
          clean: true
