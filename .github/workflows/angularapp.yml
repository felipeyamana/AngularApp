name: Build and deploy .NET Core application to Web App angularapp
on:
  push:
    branches:
    - main

permissions:
  id-token: write       # required for OIDC login
  contents: read        # required for actions/checkout 

env:
  AZURE_WEBAPP_NAME: angularapp
  AZURE_WEBAPP_PACKAGE_PATH: src\AngularApp\published
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 9.0.x
  WORKING_DIRECTORY: src\AngularApp
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Restore
      run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
    - name: Build
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: AngularApp/package-lock.json

    - name: Install Angular dependencies
      run: npm ci
      working-directory: AngularApp

    - name: Build Angular
      run: npx ng build --configuration production
      working-directory: AngularApp

    - name: Copy Angular dist to wwwroot
      run: |
        rmdir /s /q "${{ env.WORKING_DIRECTORY }}\wwwroot" || echo "no wwwroot"
        mkdir "${{ env.WORKING_DIRECTORY }}\wwwroot"
        xcopy AngularApp\dist\AngularApp\browser "${{ env.WORKING_DIRECTORY }}\wwwroot" /E /I /Y

    - name: Test
      run: dotnet test "${{ env.WORKING_DIRECTORY }}" --no-build
    - name: Publish
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
    - name: Publish Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
  deploy:
    runs-on: windows-latest
    needs: build
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
