<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
  <div class="container-fluid justify-content-between">
    <!-- Left -->
    <div class="d-flex align-items-center">
      <a class="navbar-brand me-2 d-flex align-items-center" href="#">
        <img src="https://mdbootstrap.com/img/logo/mdb-transaprent-noshadows.webp" height="20" alt="Logo" loading="lazy"
          style="margin-top: 2px;" />
      </a>

      <!-- Search -->
      <form class="input-group w-auto my-auto d-none d-sm-flex">
        <input autocomplete="off" type="search" class="form-control rounded" placeholder="Search"
          style="min-width: 125px;" />
        <span class="input-group-text border-0 d-none d-lg-flex">
          <i class="fas fa-search"></i>
        </span>
      </form>
    </div>

    <!-- Center -->
    <ul class="navbar-nav flex-row d-none d-md-flex">
      <li class="nav-item me-3">
        <a class="nav-link" href="#">
          <i class="fas fa-home fa-lg"></i>
          <span class="badge rounded-pill bg-danger">1</span>
        </a>
      </li>
      <li class="nav-item me-3">
        <a class="nav-link" href="#"><i class="fas fa-flag fa-lg"></i></a>
      </li>
      <li class="nav-item me-3">
        <a class="nav-link" role="button" ngbTooltip="View Logs" (click)="onLogsClick($event)">
          <i class="fas fa-file-alt fa-lg"></i>
        </a>
      </li>
      <li class="nav-item me-3">
        <a class="nav-link" href="#"><i class="fas fa-shopping-bag fa-lg"></i></a>
      </li>
      <li class="nav-item me-3">
        <a class="nav-link" href="#">
          <i class="fas fa-users fa-lg"></i>
          <span class="badge rounded-pill bg-danger">2</span>
        </a>
      </li>
    </ul>

    <!-- Right -->
    <ul class="navbar-nav flex-row align-items-center">
      <!-- User dropdown -->
      <li ngbDropdown class="nav-item dropdown me-3">
        <button ngbDropdownToggle class="nav-link dropdown-toggle d-flex align-items-center" id="userDropdown"
          role="button">
          <img src="https://mdbootstrap.com/img/new/avatars/1.webp" class="rounded-circle" height="22" alt="User avatar"
            loading="lazy" />
          <strong class="d-none d-sm-block ms-1">
            {{ (currentUser$ | async)?.firstName || 'Guest' }}
          </strong>
        </button>
        <ul ngbDropdownMenu class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
          <li><button class="dropdown-item" (click)="onProfileClick()">Profile</button></li>
          <li><button class="dropdown-item" (click)="onLogout()">Logout</button></li>
        </ul>
      </li>

      <!-- Settings -->
      <li class="nav-item me-3">
        <a class="nav-link" href="javascript:void(0)" (click)="onSettingsClick()" ngbTooltip="Settings"
          placement="bottom">
          <i class="fas fa-cog fa-lg"></i>
        </a>
      </li>

      <!-- Messages dropdown -->
      <li ngbDropdown class="nav-item dropdown me-3">
        <a ngbDropdownToggle class="nav-link dropdown-toggle" id="messagesDropdown">
          <i class="fas fa-comments fa-lg"></i>
          <span class="badge rounded-pill bg-danger">6</span>
        </a>
        <ul ngbDropdownMenu class="dropdown-menu dropdown-menu-end" aria-labelledby="messagesDropdown">
          <li><a class="dropdown-item" href="#">Some news</a></li>
          <li><a class="dropdown-item" href="#">Another news</a></li>
          <li><a class="dropdown-item" href="#">Something else here</a></li>
        </ul>
      </li>

      <!-- Notifications dropdown -->
      <li ngbDropdown class="nav-item dropdown me-3">
        <a ngbDropdownToggle class="nav-link dropdown-toggle position-relative" id="notificationsDropdown">

          <i class="fas fa-bell fa-lg"></i>

          <span *ngIf="unreadCount > 0"
            class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">
            {{ unreadCount }}
          </span>
        </a>

        <ul ngbDropdownMenu class="dropdown-menu dropdown-menu-end" aria-labelledby="notificationsDropdown">

          <li *ngIf="notifications.length === 0">
            <span class="dropdown-item text-muted">
              No notifications
            </span>
          </li>

          <li *ngFor="let n of notifications">
            <a class="dropdown-item" href="#">
              {{ n.payload.message }}
              <small class="text-muted d-block">
                {{ n.receivedAt}}
              </small>
            </a>
          </li>
        </ul>
      </li>


      <!-- Misc dropdown -->
      <li ngbDropdown class="nav-item dropdown me-3">
        <a ngbDropdownToggle class="nav-link dropdown-toggle" id="miscDropdown">
          <i class="fas fa-chevron-circle-down fa-lg"></i>
        </a>
        <ul ngbDropdownMenu class="dropdown-menu dropdown-menu-end" aria-labelledby="miscDropdown">
          <li><a class="dropdown-item" href="#">Some news</a></li>
          <li><a class="dropdown-item" href="#">Another news</a></li>
          <li><a class="dropdown-item" href="#">Something else here</a></li>
        </ul>
      </li>
    </ul>
  </div>
</nav>
