<app-navbar></app-navbar>

<div class="dashboard container-fluid px-3 px-lg-4 py-4">
  <header class="dashboard__header mb-4">
    <h2 class="h3 mb-1">Dashboard</h2>
    <p class="text-muted mb-0">
      Overview metrics (sample data). Each chart has its own time range.
    </p>
  </header>

  <div class="row g-4">
    <div class="col-12 col-xl-6">
      <app-dashboard-chart-card
        title="Total users"
        chartKey="users"
        chartType="line" />
    </div>
    <div class="col-12 col-xl-6">
      <app-dashboard-chart-card
        title="Chat activity"
        chartKey="chat"
        chartType="line" />
    </div>
    <div class="col-12 col-xl-6">
      <app-dashboard-chart-card
        title="Login sessions"
        chartKey="logins"
        chartType="bar" />
    </div>
    <div class="col-12 col-xl-6">
      <app-dashboard-chart-card
        title="Application logs"
        chartKey="logs"
        chartType="bar" />
    </div>
  </div>
</div>
